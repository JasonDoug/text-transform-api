services:
  summary-api:
    build: .
    container_name: summary-api
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: "8001"
      TRANSFORMATION_PROVIDER: openai-compatible
      TRANSFORMATION_BASE_URL: http://127.0.0.1:11434/v1
      TRANSFORMATION_API_KEY: ollama
      TRANSFORMATION_MODEL: llama3.1:8b
      TRANSFORMATION_TEMPERATURE: "0.2"
      TRANSFORMATION_MAX_TOKENS: "1000"
      TRANSFORMATION_TIMEOUT: "60"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
